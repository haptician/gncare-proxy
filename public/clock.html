<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Clock</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #f2f2f7;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      justify-content: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #111;
    }
    .button {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 1rem 0;
      padding: 1.2rem;
      font-size: 1.2rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: background 0.2s;
    }
    .button:disabled {
      background: #d1d1d6;
      color: #888;
      cursor: not-allowed;
      box-shadow: none;
    }
    #clockInBtn {
      background: #34c759;
      color: white;
    }
    #clockInBtn:hover:not(:disabled) {
      background: #28a745;
    }
    #clockOutBtn {
      background: #ff3b30;
      color: white;
    }
    #clockOutBtn:hover:not(:disabled) {
      background: #d32f2f;
    }
  </style>
</head>
<body>
  <h1>Office Clock</h1>
  <button id="clockInBtn" class="button">Clock In</button>
  <button id="clockOutBtn" class="button" disabled>Clock Out</button>

  <script>
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");

    async function sendRecord(action) {
      const record = {
        action,
        time: new Date().toISOString(),
        location: { latitude: 37.5049, longitude: 127.0440 } // replace with real GPS if needed
      };
      await fetch("/addRecord", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(record)
      });
    }

    clockInBtn.addEventListener("click", async () => {
      await sendRecord("clock-in");
      clockInBtn.disabled = true;
      clockOutBtn.disabled = false;
    });

    clockOutBtn.addEventListener("click", async () => {
      await sendRecord("clock-out");
      clockOutBtn.disabled = true;
      clockInBtn.disabled = false;
    });
  </script>
</body>
</html>
