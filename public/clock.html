<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timesheet</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="gncare.png">
  <link rel="apple-touch-icon" sizes="167x167" href="gncare.png">
  <link rel="apple-touch-icon" sizes="152x152" href="gncare.png">
  <link rel="apple-touch-icon" sizes="120x120" href="gncare.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #f2f2f7;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      justify-content: center;
      padding: 1rem;
    }
    h1 { font-size: 2.2rem; font-weight: 600; margin-bottom: 2rem; color: #111; }
    .button {
      display: block; width: 90%; max-width: 350px; margin: 1rem 0; padding: 1.5rem;
      font-size: 1.4rem; font-weight: 600; border: none; border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); cursor: pointer; transition: background 0.2s;
    }
    .button:disabled { background: #d1d1d6; color: #888; cursor: not-allowed; box-shadow: none; }
    #clockInBtn { background: #34c759; color: white; }
    #clockInBtn:hover:not(:disabled) { background: #28a745; }
    #clockOutBtn { background: #ff3b30; color: white; }
    #clockOutBtn:hover:not(:disabled) { background: #d32f2f; }
    #status { margin-top: 2rem; font-size: 1.2rem; font-weight: 500; color: #555; }
    #message { margin-top: 1rem; font-size: 0.95rem; color: #1976d2; }
    #reportLink { margin-top: auto; margin-bottom: 1rem; font-size: 1.1rem; }
    #reportLink a { color: #007aff; text-decoration: none; font-weight: 600; }
    #reportLink a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Timesheet</h1>
  <button id="clockInBtn" class="button">Clock In</button>
  <button id="clockOutBtn" class="button" disabled>Clock Out</button>
  <div id="status">You are currently clocked out.</div>
  <div id="message"></div>
  <div id="reportLink">
    <a href="index.html">📊 View Report</a>
  </div>

  <div id="calendar"></div>

  <script>
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");
    const statusDiv = document.getElementById("status");
    const messageDiv = document.getElementById("message");

    async function sendRecord(action, latitude, longitude) {
      const record = {
        action,
        record_time: new Date().toISOString(),
        latitude,
        longitude
      };
      try {
        const response = await fetch("/addRecord", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(record)
        });
        if (!response.ok) throw new Error("Server error");
        const result = await response.json();
        if (result.success) {
          messageDiv.textContent = `✔ ${action.replace("clock-", "Clock-")} recorded at ${new Date(record.record_time).toLocaleString()}`;
        } else {
          messageDiv.textContent = "❌ Failed to save record.";
        }
      } catch (err) {
        console.error("Error saving record:", err);
        messageDiv.textContent = "❌ Failed to save record.";
      }
    }

    function getLocationAndSend(action) {
      if (!navigator.geolocation) {
        messageDiv.textContent = "❌ Geolocation not supported.";
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          sendRecord(action, pos.coords.latitude, pos.coords.longitude);
        },
        (err) => {
          console.error("Geolocation error:", err);
          messageDiv.textContent = "❌ Location not available.";
        }
      );
    }

    clockInBtn.addEventListener("click", async () => {
      getLocationAndSend("clock-in");
      clockInBtn.disabled = true;
      clockOutBtn.disabled = false;
      statusDiv.textContent = "You are currently clocked in.";
    });

    clockOutBtn.addEventListener("click", async () => {
      getLocationAndSend("clock-out");
      clockOutBtn.disabled = true;
      clockInBtn.disabled = false;
      statusDiv.textContent = "You are currently clocked out.";
    });

    function renderCalendar() {
  const calendarDiv = document.getElementById("calendar");
  calendarDiv.innerHTML = "";

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  // First day of month
  const firstDay = new Date(year, month, 1).getDay();
  // Number of days in month
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const table = document.createElement("table");
  table.style.borderCollapse = "collapse";
  table.style.width = "100%";
  table.style.marginTop = "2rem";

  const headerRow = document.createElement("tr");
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
    const th = document.createElement("th");
    th.textContent = d;
    th.style.padding = "5px";
    th.style.border = "1px solid #ccc";
    headerRow.appendChild(th);
  });
  table.appendChild(headerRow);

  let row = document.createElement("tr");
  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    row.appendChild(document.createElement("td"));
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement("td");
    cell.textContent = day;
    cell.style.padding = "10px";
    cell.style.border = "1px solid #ccc";
    cell.style.textAlign = "center";
    cell.style.cursor = "pointer";

    // Hover tooltip with records
    const dateStr = new Date(year, month, day).toLocaleDateString();
    const dayRecords = allRecords.filter(r => {
      return new Date(r.record_time).toLocaleDateString() === dateStr;
    });

    if (dayRecords.length > 0) {
      cell.style.backgroundColor = "#e3f2fd"; // highlight days with records
      cell.title = dayRecords.map(r => {
        const time = new Date(r.record_time).toLocaleTimeString();
        return `${r.action}: ${time}`;
      }).join("\n");
    }

    row.appendChild(cell);

    if ((day + firstDay) % 7 === 0) {
      table.appendChild(row);
      row = document.createElement("tr");
    }
  }

  // Fill remaining cells
  if (row.children.length > 0) {
    while (row.children.length < 7) {
      row.appendChild(document.createElement("td"));
    }
    table.appendChild(row);
  }

  calendarDiv.appendChild(table);
}
  </script>
</body>
</html>
