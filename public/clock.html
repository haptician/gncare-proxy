<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Clock</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="gncare.png">
    <link rel="apple-touch-icon" sizes="167x167" href="gncare.png">
    <link rel="apple-touch-icon" sizes="152x152" href="gncare.png">
    <link rel="apple-touch-icon" sizes="120x120" href="gncare.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #f2f2f7;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      justify-content: center;
      padding: 1rem;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #111;
    }
    .button {
      display: block;
      width: 90%;
      max-width: 350px;
      margin: 1rem 0;
      padding: 1.5rem;
      font-size: 1.4rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: background 0.2s;
    }
    .button:disabled {
      background: #d1d1d6;
      color: #888;
      cursor: not-allowed;
      box-shadow: none;
    }
    #clockInBtn {
      background: #34c759;
      color: white;
    }
    #clockInBtn:hover:not(:disabled) {
      background: #28a745;
    }
    #clockOutBtn {
      background: #ff3b30;
      color: white;
    }
    #clockOutBtn:hover:not(:disabled) {
      background: #d32f2f;
    }
    #status {
      margin-top: 2rem;
      font-size: 1.2rem;
      font-weight: 500;
      color: #555;
    }
    #message {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #1976d2;
    }
  </style>
</head>
<body>
  <h1>Office Clock</h1>
  <button id="clockInBtn" class="button">Clock In</button>
  <button id="clockOutBtn" class="button" disabled>Clock Out</button>
  <div id="status">You are currently clocked out.</div>
  <div id="message"></div>

  <script>
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");
    const statusDiv = document.getElementById("status");
    const messageDiv = document.getElementById("message");

    async function sendRecord(action) {
      const record = {
        action,
        time: new Date().toISOString(),
        location: { latitude: 37.5049, longitude: 127.0440 } // replace with real GPS if needed
      };
      try {
        const response = await fetch("/addRecord", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(record)
        });
        if (!response.ok) throw new Error("Server error");
        const result = await response.json();
        messageDiv.textContent = `✔ ${action.replace("clock-", "Clock ")} recorded at ${new Date(record.time).toLocaleString()}`;
      } catch (err) {
        console.error("Error saving record:", err);
        messageDiv.textContent = "❌ Failed to save record.";
      }
    }

    clockInBtn.addEventListener("click", async () => {
      await sendRecord("clock-in");
      clockInBtn.disabled = true;
      clockOutBtn.disabled = false;
      statusDiv.textContent = "You are currently clocked in.";
    });

    clockOutBtn.addEventListener("click", async () => {
      await sendRecord("clock-out");
      clockOutBtn.disabled = true;
      clockInBtn.disabled = false;
      statusDiv.textContent = "You are currently clocked out.";
    });
  </script>
</body>
</html>
