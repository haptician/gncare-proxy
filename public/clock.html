<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Clock</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f9f9f9;
    }
    button {
      margin-right: 1rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 4px;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Office Clock</h1>
  <button id="clockInBtn">Clock In</button>
  <button id="clockOutBtn" disabled>Clock Out</button>

  <script>
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");

    async function sendRecord(action) {
      const record = {
        action,
        time: new Date().toISOString(),
        location: { latitude: 37.5049, longitude: 127.0440 } // replace with real GPS if needed
      };
      await fetch("/addRecord", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(record)
      });
    }

    clockInBtn.addEventListener("click", async () => {
      await sendRecord("clock-in");
      clockInBtn.disabled = true;
      clockOutBtn.disabled = false;
    });

    clockOutBtn.addEventListener("click", async () => {
      await sendRecord("clock-out");
      clockOutBtn.disabled = true;
      clockInBtn.disabled = false;
    });
  </script>
</body>
</html>
