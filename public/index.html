<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timesheet</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="gncare.png">
  <link rel="apple-touch-icon" sizes="167x167" href="gncare.png">
  <link rel="apple-touch-icon" sizes="152x152" href="gncare.png">
  <link rel="apple-touch-icon" sizes="120x120" href="gncare.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #f2f2f7;
      color: #333;
      padding: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    #controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    button {
      flex: 1 1 22%;
      min-width: 70px;
      max-width: 100px;
      padding: 0.6rem 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
    }
    button:hover { background: #1565c0; }
    @media (max-width: 480px) {
      button { flex: 1 1 45%; max-width: none; }
    }
    .date-header {
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      padding: 0.75rem;
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
    }
    .record {
      margin: 0.5rem 0;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      line-height: 1.4;
    }
    .record.clock-in { border-left: 5px solid #34c759; }
    .record.clock-out { border-left: 5px solid #ff3b30; }
    a.map-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: #1976d2;
      text-decoration: none;
    }
    a.map-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Office Report</h1>
  <div id="controls">
    <button onclick="setFilter(null)">Show All</button>
    <button onclick="setFilter('week')">This Week</button>
    <button onclick="setFilter('month')">This Month</button>
    <button onclick="exportCSV()">Save to CSV</button>
  </div>
  <div id="records">Loading records...</div>

  <script>
    let allRecords = [];
    let currentFilter = "week"; // default to weekly view

    async function loadRecords() {
      try {
        const response = await fetch("/records");
        if (!response.ok) throw new Error("Failed to fetch records");
        allRecords = await response.json();
        renderRecords();
      } catch (err) {
        document.getElementById("records").textContent = "Error loading records.";
        console.error(err);
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      renderRecords();
    }

    function renderRecords() {
      const now = new Date();
      let filtered = allRecords;

      if (currentFilter === "week") {
        const startOfWeek = new Date(now);
        const day = startOfWeek.getDay();
        const diff = startOfWeek.getDate() - day + (day === 0 ? -6 : 1);
        startOfWeek.setDate(diff);
        startOfWeek.setHours(0,0,0,0);
        filtered = allRecords.filter(r => new Date(r.record_time) >= startOfWeek);
      } else if (currentFilter === "month") {
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        filtered = allRecords.filter(r => new Date(r.record_time) >= startOfMonth);
      }

      // Sort newest first
      filtered.sort((a, b) => new Date(b.record_time) - new Date(a.record_time));

      const recordsDiv = document.getElementById("records");
      recordsDiv.innerHTML = "";

      let currentDate = null;
      let dayRecords = [];

	    function flushDay() {
  if (dayRecords.length > 0) {
    // Sort strictly by time
    dayRecords.sort((a, b) => new Date(a.dataset.time) - new Date(b.dataset.time));

    // Walk through and pair clock-in with next clock-out
    for (let i = 0; i < dayRecords.length; i++) {
      const rec = dayRecords[i];
      if (rec.dataset.action === "clock-in") {
        recordsDiv.appendChild(rec);
        // look ahead for a clock-out
        if (i + 1 < dayRecords.length && dayRecords[i+1].dataset.action === "clock-out") {
          recordsDiv.appendChild(dayRecords[i+1]);
          i++; // skip the paired out
        }
      } else {
        // if an out has no matching in, just show it
        recordsDiv.appendChild(rec);
      }
    }
    dayRecords = [];
  }
}

      filtered.forEach(r => {
        const recordDate = new Date(r.record_time).toLocaleDateString();
        if (recordDate !== currentDate) {
          flushDay();
          currentDate = recordDate;
          const dateHeader = document.createElement("div");
          dateHeader.className = "date-header";
          dateHeader.textContent = recordDate;
          recordsDiv.appendChild(dateHeader);
        }
        const div = document.createElement("div");
        div.className = `record ${r.action}`;
        div.dataset.action = r.action;
        div.dataset.time = r.record_time;
        const time = new Date(r.record_time).toLocaleTimeString();
        const mapsUrl = `https://www.google.com/maps?q=${r.latitude},${r.longitude}`;
        const label = r.action === "clock-in" ? "In" : "Out";
        div.innerHTML = `${label} - ${time}<br><a class="map-link" href="${mapsUrl}" target="_blank">View on map</a>`;
        dayRecords.push(div);
      });

      flushDay();
    }

    function exportCSV() {
      const rows = [["Action", "Time", "Latitude", "Longitude"]];
      allRecords.forEach(r => {
        rows.push([r.action, new Date(r.record_time).toLocaleString(), r.latitude, r.longitude]);
      });
      let csvContent = rows.map(e => e.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", "gncare_report.csv");
      link.click();
    }

    loadRecords();
  </script>
</body>
</html>
