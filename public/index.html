<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Office Report</title>
  <link rel="apple-touch-icon" sizes="180x180" href="gncare.png">
  <link rel="apple-touch-icon" sizes="152x152" href="gncare.png">
  <link rel="apple-touch-icon" sizes="120x120" href="gncare.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      background: #f9f9f9;
    }
    h1 {
      color: #333;
    }
    #summary {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: #e8f5e9;
      border: 1px solid #c8e6c9;
      border-radius: 5px;
    }
    .record {
      margin: 0.5rem 0;
      padding: 0.5rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .record.clock-in {
      border-left: 5px solid #4caf50;
    }
    .record.clock-out {
      border-left: 5px solid #f44336;
    }
  </style>
</head>
<body>
  <h1>Report</h1>
  <div id="summary">Loading summary...</div>
  <div id="records">Loading records...</div>

  <script>
    async function loadRecords() {
      try {
        const response = await fetch("/records");
        if (!response.ok) throw new Error("Failed to fetch records");
        const records = await response.json();

        // Summary
        const summaryDiv = document.getElementById("summary");
        summaryDiv.textContent = `Total records: ${records.length}`;

        // Records list
        const recordsDiv = document.getElementById("records");
        recordsDiv.innerHTML = "";
        records.forEach(r => {
          const div = document.createElement("div");
          div.className = `record ${r.action}`;
          const time = new Date(r.time).toLocaleString();
          div.textContent = `${r.name} ${r.action} at ${time} (lat: ${r.location.latitude}, lon: ${r.location.longitude})`;
          recordsDiv.appendChild(div);
        });
      } catch (err) {
        document.getElementById("summary").textContent = "Error loading records.";
        console.error(err);
      }
    }

    loadRecords();
  </script>
</body>
</html>
