<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timesheet</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" sizes="180x180" href="gncare.png">
  <link rel="apple-touch-icon" sizes="167x167" href="gncare.png">
  <link rel="apple-touch-icon" sizes="152x152" href="gncare.png">
  <link rel="apple-touch-icon" sizes="120x120" href="gncare.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
/* Toast notification styles */
#toast {
  visibility: hidden;
  min-width: 250px;
  margin-left: -125px;
  background-color: #333;
  color: #fff;
  text-align: center;
  border-radius: 8px;
  padding: 16px;
  position: fixed;
  z-index: 1000;
  left: 50%;
  bottom: 30px;
  font-size: 1rem;
  opacity: 0;
  transition: opacity 0.5s, bottom 0.5s;
}

#toast.show {
  visibility: visible;
  opacity: 1;
  bottom: 50px;
}
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background: #f2f2f7;
      color: #333;
      padding: 1rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    #controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    button {
      flex: 1 1 22%;
      min-width: 70px;
      max-width: 100px;
      padding: 0.6rem 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: #1976d2;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
    }
    button:hover:enabled { background: #1565c0; }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }
    @media (max-width: 480px) {
      button { flex: 1 1 45%; max-width: none; }
    }
    .date-header {
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      padding: 0.75rem;
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
    }
    .record {
      margin: 0.5rem 0;
      padding: 1rem;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      line-height: 1.4;
    }
    .record.clock-in { border-left: 5px solid #34c759; }
    .record.clock-out { border-left: 5px solid #ff3b30; }

.record-row {
  display: flex;
  gap: 1rem;
  margin-bottom: 6px;
}

.record-row .record {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid #ccc;
  position: relative;
  background: #fafafa;
  transition: background-color 0.2s ease;
}

    /* Clock-in cell: green bar + light green background */
.record-row .record.in {
  border-left: 6px solid #4CAF50;
  background-color: #e8f5e9;
  transition: background-color 0.2s ease;
}
/* Clock-in hover: deeper green */
.record-row .record.in:hover {
  background-color: #c8e6c9; /* slightly deeper green */
}

/* Clock-out cell: red bar + light red background */
.record-row .record.out {
  border-left: 6px solid #F44336;
  background-color: #ffebee;
  transition: background-color 0.2s ease;
}
/* Clock-out hover: deeper red */
.record-row .record.out:hover {
  background-color: #ffcdd2; /* slightly deeper red */
}

/* Pending/empty cell: gray bar + light gray background */
.record-row .record.out.empty {
  border-left: 6px solid #999;
  background-color: #f5f5f5;
  color: #888;
  font-style: italic;
  transition: background-color 0.2s ease;
}
    /* Pending hover: deeper gray */
.record-row .record.out.empty:hover {
  background-color: #e0e0e0; /* slightly deeper gray */
}

    a.map-link {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: #1976d2;
      text-decoration: none;
    }
    a.map-link:hover { text-decoration: underline; }
    #calendar-controls {
      text-align: center;
      margin-top: 2rem;
    }
    #calendar-title {
      margin: 0 1rem;
      font-weight: 600;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 1rem;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }
    [data-tooltip] { position: relative; }
[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  white-space: pre;
  line-height: 1.6;
  z-index: 10;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  min-width: 100px;
  text-align: left;
}
[data-tooltip]:hover::after { opacity: 1; }
  </style>
</head>
<body>
  <h1>Timesheet</h1>
  <div id="controls">
    <button onclick="setFilter(null)">Show All</button>
    <button onclick="setFilter('week')">This Week</button>
    <button onclick="setFilter('month')">This Month</button>
    <button onclick="exportCSV()">Save to CSV</button>
  </div>
  <div id="records">Loading records...</div>

  <div id="calendar-controls">
    <button id="prevBtn" onclick="changeMonth(-1)">Previous</button>
    <span id="calendar-title"></span>
    <button id="nextBtn" onclick="changeMonth(1)">Next</button>
  </div>
  <div id="calendar"></div>

  <script>
  // Show success alert
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.className = "show";
  setTimeout(() => {
    toast.className = toast.className.replace("show", "");
  }, 3000); // disappears after 3 seconds
}

  function toDateKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

    let allRecords = [];
    let currentFilter = "week"; // default to weekly view
    let calendarYear = new Date().getFullYear();
    let calendarMonth = new Date().getMonth(); // 0 = Jan

    async function loadRecords() {
      try {
        const response = await fetch("/records");
        if (!response.ok) throw new Error("Failed to fetch records");
        allRecords = await response.json();
        renderRecords();
        renderCalendar();
      } catch (err) {
        document.getElementById("records").textContent = "Error loading records.";
        console.error(err);
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      renderRecords();
    }

  function renderRecords() {
  try {
    const now = new Date();
    let filtered = allRecords;

    if (currentFilter === "week") {
      const startOfWeek = new Date(now);
      const day = startOfWeek.getDay();
      const diff = startOfWeek.getDate() - day + (day === 0 ? -6 : 1);
      startOfWeek.setDate(diff);
      startOfWeek.setHours(0,0,0,0);
      filtered = allRecords.filter(r => new Date(r.record_time) >= startOfWeek);
    } else if (currentFilter === "month") {
      const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      filtered = allRecords.filter(r => new Date(r.record_time) >= startOfMonth);
    }

    filtered.sort((a, b) => new Date(b.record_time) - new Date(a.record_time));

    const recordsDiv = document.getElementById("records");
    recordsDiv.innerHTML = "";

    let currentDate = null;
    let dayRecords = [];

	  function flushDay() {
  if (dayRecords.length > 0) {
    dayRecords.sort((a, b) => new Date(a.dataset.time) - new Date(b.dataset.time));

    let i = 0;
    while (i < dayRecords.length) {
      const rec = dayRecords[i];

      if (rec.dataset.action === "clock-in") {
        // Build In cell
        const inDiv = document.createElement("div");
        inDiv.className = "record in";
        inDiv.dataset.action = "clock-in";
        inDiv.dataset.time = rec.dataset.time;
        inDiv.innerHTML = rec.innerHTML;

        let outDiv = null;
        if (i + 1 < dayRecords.length && dayRecords[i+1].dataset.action === "clock-out") {
          const nextRec = dayRecords[i+1];
          outDiv = document.createElement("div");
          outDiv.className = "record out";
          outDiv.dataset.action = "clock-out";
          outDiv.dataset.time = nextRec.dataset.time;
          outDiv.innerHTML = nextRec.innerHTML;
          i += 2; // skip both in/out
        } else {
          // No matching out → show pending
          outDiv = document.createElement("div");
          outDiv.className = "record out empty";
          outDiv.textContent = "Out - (pending)";
          i += 1; // skip only the in
        }

        const row = document.createElement("div");
        row.className = "record-row";
        row.appendChild(inDiv);
        row.appendChild(outDiv);
        recordsDiv.appendChild(row);

      } else if (rec.dataset.action === "clock-out") {
        // Handle stray clock-out with no in
        const row = document.createElement("div");
        row.className = "record-row";

        const emptyIn = document.createElement("div");
        emptyIn.className = "record in empty";
        emptyIn.textContent = "In - (missing)";
        row.appendChild(emptyIn);

        const outDiv = document.createElement("div");
        outDiv.className = "record out";
        outDiv.dataset.action = "clock-out";
        outDiv.dataset.time = rec.dataset.time;
        outDiv.innerHTML = rec.innerHTML;
        row.appendChild(outDiv);

        recordsDiv.appendChild(row);
        i += 1;
      }
    }

    dayRecords = [];
  }
}

	    filtered.forEach((r, idx) => {
      const recordDate = new Date(r.record_time).toLocaleDateString();
      if (recordDate !== currentDate) {
        flushDay();
        currentDate = recordDate;
        const dateHeader = document.createElement("div");
        dateHeader.className = "date-header";
        const dateObj = new Date(r.record_time);
        const dayName = dateObj.toLocaleDateString(undefined, { weekday: 'short' });
        dateHeader.textContent = `${recordDate} ${dayName}`;
        recordsDiv.appendChild(dateHeader);
      }

      const div = document.createElement("div");
      div.dataset.action = r.action;
      div.dataset.time = r.record_time;
      const time = new Date(r.record_time).toLocaleTimeString();
      const mapsUrl = `https://www.google.com/maps?q=${r.latitude},${r.longitude}`;
      const label = r.action === "clock-in" ? "In" : "Out";
      div.innerHTML = `${label} - ${time}<br><a class="map-link" href="${mapsUrl}" target="_blank">View on map</a>`;
      dayRecords.push(div);

      if (idx === filtered.length - 1) {
        flushDay();
      }
    });

    if (filtered.length === 0) {
      recordsDiv.textContent = "No records found.";
    }

  } catch (err) {
    console.error("Error in renderRecords:", err);
    document.getElementById("records").textContent = "Error rendering records.";
  }
}

function exportCSV() {
  const confirmExport = confirm("Do you want to export the attendance data to CSV?");
  if (!confirmExport) return;

  const records = currentFilter ? getFilteredRecords() : allRecords;

  let csvContent = '"Date","Time","Action","Latitude","Longitude"\n';
  records.forEach(r => {
    const date = new Date(r.record_time).toLocaleDateString();
    const time = new Date(r.record_time).toLocaleTimeString();
    csvContent += `"${date}","${time}","${r.action}","${r.latitude}","${r.longitude}"\n`;
  });

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "GNCare_timesheet.csv";
  link.click();

  showToast("CSV exported successfully ✅");
}

// Pull out the filter logic so both renderRecords() and exportCSV() can use it
function getFilteredRecords() {
  const now = new Date();
  if (currentFilter === "week") {
    const startOfWeek = new Date(now);
    const day = startOfWeek.getDay();
    startOfWeek.setDate(startOfWeek.getDate() - day + (day === 0 ? -6 : 1));
    startOfWeek.setHours(0, 0, 0, 0);
    return allRecords.filter(r => new Date(r.record_time) >= startOfWeek);
  } else if (currentFilter === "month") {
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    return allRecords.filter(r => new Date(r.record_time) >= startOfMonth);
  }
  return allRecords;
}

		    function renderCalendar() {
      const calendarDiv = document.getElementById("calendar");
      calendarDiv.innerHTML = "";

      const year = calendarYear;
      const month = calendarMonth;

      // Update title
      const monthNames = ["January","February","March","April","May","June","July",
                          "August","September","October","November","December"];
      document.getElementById("calendar-title").textContent = `${monthNames[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const table = document.createElement("table");
      const headerRow = document.createElement("tr");
      ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
        const th = document.createElement("th");
        th.textContent = d;
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      let row = document.createElement("tr");
      for (let i = 0; i < firstDay; i++) {
        row.appendChild(document.createElement("td"));
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const cell = document.createElement("td");
        cell.textContent = day;
        cell.style.cursor = "pointer";

	      const dateStr = toDateKey(new Date(year, month, day));
const dayRecords = allRecords.filter(r => toDateKey(r.record_time) === dateStr);

	      if (dayRecords.length > 0) {
  cell.style.backgroundColor = "#e3f2fd";

  // Sort records by time ascending so In shows before Out
  dayRecords.sort((a, b) => new Date(a.record_time) - new Date(b.record_time));

		      cell.dataset.tooltip = dayRecords.map(r => {
  const time = new Date(r.record_time).toLocaleTimeString();
  const label = r.action === "clock-in" ? "In" : "Out";
  return `${label}: ${time}`;
}).join("\n")
}

        row.appendChild(cell);

        if ((day + firstDay) % 7 === 0) {
          table.appendChild(row);
          row = document.createElement("tr");
        }
      }

      if (row.children.length > 0) {
        while (row.children.length < 7) {
          row.appendChild(document.createElement("td"));
        }
        table.appendChild(row);
      }

      calendarDiv.appendChild(table);

      // Disable navigation buttons if no data in that month
      const prevMonth = (month === 0) ? 11 : month - 1;
      const prevYear = (month === 0) ? year - 1 : year;
      const nextMonth = (month === 11) ? 0 : month + 1;
      const nextYear = (month === 11) ? year + 1 : year;

      const hasPrevData = allRecords.some(r => {
        const d = new Date(r.record_time);
        return d.getFullYear() === prevYear && d.getMonth() === prevMonth;
      });
      const hasNextData = allRecords.some(r => {
        const d = new Date(r.record_time);
        return d.getFullYear() === nextYear && d.getMonth() === nextMonth;
      });

      document.getElementById("prevBtn").disabled = !hasPrevData;
      document.getElementById("nextBtn").disabled = !hasNextData;
    }

    function changeMonth(offset) {
      calendarMonth += offset;
      if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear--;
      } else if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear++;
      }
      renderCalendar();
    }

    loadRecords();

  </script>
  <div id="toast"></div>
</body>
</html>
